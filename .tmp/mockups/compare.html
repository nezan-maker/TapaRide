<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tapa Landing Page - Mockup vs Implementation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', system-ui, sans-serif; background: #1a1a2e; color: #eee; }
  .header { background: #16213e; padding: 16px 24px; border-bottom: 2px solid #0f3460; }
  .header h1 { font-size: 1.4rem; color: #e94560; }
  .header p { font-size: 0.85rem; color: #9ca3af; margin-top: 4px; }
  .comparison { display: flex; gap: 24px; padding: 24px; }
  .panel { flex: 1; }
  .panel h2 { font-size: 1rem; margin-bottom: 12px; padding: 8px 12px; border-radius: 8px; }
  .panel.mockup h2 { background: #0f3460; color: #53d8fb; }
  .panel.actual h2 { background: #1a3a1a; color: #7dff7d; }
  .panel img { width: 100%; border-radius: 12px; border: 2px solid #333; }
  .panel iframe { width: 100%; height: 900px; border-radius: 12px; border: 2px solid #333; background: white; }
  .mockup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .mockup-grid .full { grid-column: 1 / -1; }
  .mockup-item { margin-bottom: 16px; }
  .mockup-item h3 { font-size: 0.85rem; color: #53d8fb; margin-bottom: 8px; }
  .mockup-item img { width: 100%; border-radius: 8px; border: 1px solid #333; }
</style>
</head>
<body>
<div class="header">
  <h1>🔍 Tapa Landing Page — Mockup vs Implementation</h1>
  <p>Left: Design mockups | Right: Actual rendered page (localhost:3000)</p>
</div>
<div class="comparison">
  <div class="panel mockup">
    <h2>📐 Design Mockups</h2>
    <div class="mockup-grid">
      <div class="mockup-item full">
        <h3>Main-1 (Full Landing Page)</h3>
        <img src="file:///home/nezn/Tapa/.tmp/mockups/Main-1.jpg" alt="Main mockup">
      </div>
      <div class="mockup-item">
        <h3>Container-1</h3>
        <img src="file:///home/nezn/Tapa/.tmp/mockups/Container-1.jpg" alt="Container 1">
      </div>
      <div class="mockup-item">
        <h3>Container-1-1</h3>
        <img src="file:///home/nezn/Tapa/.tmp/mockups/Container-1-1.jpg" alt="Container 1-1">
      </div>
      <div class="mockup-item">
        <h3>Container-2-1</h3>
        <img src="file:///home/nezn/Tapa/.tmp/mockups/Container-2-1.jpg" alt="Container 2-1">
      </div>
      <div class="mockup-item">
        <h3>Section-1</h3>
        <img src="file:///home/nezn/Tapa/.tmp/mockups/Section-1.jpg" alt="Section 1">
      </div>
      <div class="mockup-item">
        <h3>Section-1-1</h3>
        <img src="file:///home/nezn/Tapa/.tmp/mockups/Section-1-1.jpg" alt="Section 1-1">
      </div>
    </div>
  </div>
  <div class="panel actual">
    <h2>🖥️ Actual Implementation</h2>
    <iframe src="http://localhost:3000"></iframe>
  </div>
</div>
</body>
</html>
