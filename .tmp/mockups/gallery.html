<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mockup Gallery</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', system-ui, sans-serif; background: #0d0d1a; color: #eee; padding: 24px; }
  h1 { text-align: center; margin-bottom: 8px; color: #e94560; font-size: 1.6rem; }
  .subtitle { text-align: center; color: #9ca3af; margin-bottom: 32px; font-size: 0.9rem; }
  .gallery { display: flex; flex-direction: column; gap: 32px; max-width: 1200px; margin: 0 auto; }
  .item { background: #16213e; border-radius: 16px; padding: 20px; border: 1px solid #0f3460; }
  .item h2 { color: #53d8fb; font-size: 1.1rem; margin-bottom: 12px; }
  .item img { width: 100%; height: auto; border-radius: 8px; cursor: zoom-in; transition: transform 0.2s; }
  .item img:hover { transform: scale(1.01); }
  .item .meta { color: #6b7280; font-size: 0.8rem; margin-top: 8px; }
</style>
</head>
